<div class="app-container">
  <!-- Top Navigation Header -->
  <header class="premium-navbar">
    <div class="brand-section">
      <div class="brand-icon">
        <mat-icon>menu_book</mat-icon>
      </div>
      <span class="brand-name">Book Store Inventory Management</span>
    </div>
    <!-- <div class="nav-actions">
      <button mat-icon-button matTooltip="Notifications">
        <mat-icon matBadge="3" matBadgeColor="warn">notifications</mat-icon>
      </button>
      <button mat-icon-button matTooltip="Quick Settings">
        <mat-icon>settings</mat-icon>
      </button>
      <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=256&auto=format&fit=crop" 
           alt="User Profile" 
           class="user-avatar"
           matTooltip="divyanavalkar7 (Admin)" />
    </div> -->
  </header>

  <!-- Sidebar & Main Content Wrapper -->
  <div class="main-wrapper">
    <app-sidebar></app-sidebar>

    <!-- Main Content Area -->
    <main class="content-area">
      <!-- Error Banner -->
      @if (service.errorMessage()) {
      <div class="error-banner"
        style="background: #fef2f2; border: 1px solid #fee2e2; border-left: 4px solid #ef4444; border-radius: 12px; padding: 16px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.05);">
        <div style="display: flex; align-items: center; gap: 12px;">
          <mat-icon style="color: #ef4444; font-size: 24px; width: 24px; height: 24px;">error_outline</mat-icon>
          <span style="color: #991b1b; font-size: 14px; font-weight: 500;">{{ service.errorMessage() }}</span>
        </div>
        <button mat-icon-button (click)="service.clearError()"
          style="color: #991b1b; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px;">
          <mat-icon style="font-size: 18px; width: 18px; height: 18px; line-height: 18px;">close</mat-icon>
        </button>
      </div>
      }

      <!-- Loading State Overlay -->
      @if (service.isLoading()) {
      <div class="loading-overlay"
        style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(4px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transition: all 0.3s ease;">
        <mat-spinner diameter="60" color="primary"></mat-spinner>
        <p style="margin-top: 16px; font-weight: 600; color: #4f46e5; font-size: 16px;">Processing inventory request...
        </p>
      </div>
      }

      <!-- Render the routed component -->
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
